<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Case Clicker v2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1b2838;
  color:white;
}

header{
  background:#171a21;
  padding:10px;
  text-align:center;
  font-size:14px;
}

nav{
  background:#171a21;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

nav button{
  flex:1 1 30%;
  margin:4px;
  padding:10px;
  background:#2a475e;
  border:none;
  color:white;
  font-size:14px;
}

button{
  background:#2a475e;
  border:none;
  padding:10px;
  color:white;
  margin:5px;
}

button:hover{background:#3b6a8c;}

.section{display:none;padding:15px;}
.active{display:block;}

.card{
  background:#2a2f3a;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  font-size:14px;
}

.rarity-blue{border-left:5px solid #4b69ff;}
.rarity-purple{border-left:5px solid #8847ff;}
.rarity-pink{border-left:5px solid #d32ce6;}
.rarity-red{border-left:5px solid #eb4b4b;}
.rarity-gold{border-left:5px solid gold;}

input{
  padding:8px;
  width:100%;
  margin:5px 0;
  box-sizing:border-box;
}

#caseAnimation{
  overflow:hidden;
  white-space:nowrap;
  width:100%;
  height:80px;
  background:#111;
  margin-top:10px;
}

.caseItem{
  display:inline-block;
  width:140px;
  margin:5px;
  padding:10px;
  background:#2a2f3a;
  font-size:12px;
}

@media(min-width:768px){
  nav button{flex:1;}
  body{max-width:900px;margin:auto;}
}
</style>
</head>

<body>

<header>
💰 $<span id="money">0</span> |
XP: <span id="xp">0</span> |
Level: <span id="level">1</span> |
Rank: <span id="rank">Silver I</span> |
Prestige: <span id="prestige">0</span>
</header>

<nav>
<button onclick="show('clicker')">Click</button>
<button onclick="show('cases')">Cases</button>
<button onclick="show('inventory')">Inventory</button>
<button onclick="show('games')">Games</button>
<button onclick="show('banking')">Bank</button>
<button onclick="show('leader')">Leaderboard</button>
</nav>

<div id="clicker" class="section active">
<h3>Click for Money</h3>
<button onclick="clickMoney()">Click (+$)</button>
<button onclick="buyAuto()">Buy Auto Clicker ($500)</button>
<p>Auto Clickers: <span id="auto">0</span></p>
<button onclick="doPrestige()">Prestige (Lvl 20)</button>
</div>

<div id="cases" class="section">
<h3>Open Case ($50)</h3>
<button onclick="openCase()">Open</button>
<div id="caseAnimation"></div>
<p id="drop"></p>
</div>

<div id="inventory" class="section">
<h3>Inventory</h3>
<div id="inv"></div>
</div>

<div id="games" class="section">
<h3>Roulette</h3>
<input id="rouletteBet" placeholder="Bet Amount">
<button onclick="spinRoulette()">Spin</button>
<p id="rouletteResult"></p>

<h3>Blackjack</h3>
<input id="bjBet" placeholder="Bet Amount">
<button onclick="startBJ()">Deal</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>
<p id="bjDisplay"></p>

<h3>Case Battle ($100)</h3>
<button onclick="caseBattle()">Battle Bot</button>
<p id="battleResult"></p>
</div>

<div id="banking" class="section">
<h3>Bank</h3>
Balance: $<span id="bank">0</span>
<br>
<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw All</button>
</div>

<div id="leader" class="section">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<script>
let money=0,xp=0,level=1,bank=0,prestige=0,autoClickers=0;
let inventory=[];
let bjPlayer=[],bjDealer=[],bjBet=0;

const ranks=["Silver I","Silver II","Gold Nova","Master Guardian","Legendary Eagle","Supreme","Global Elite"];

const skins=[
{name:"AK-47 | Elite Build",rarity:"blue",base:20,weight:40},
{name:"M4A1-S | Cyrex",rarity:"purple",base:40,weight:25},
{name:"AWP | Oni Taiji",rarity:"pink",base:70,weight:15},
{name:"AK-47 | Bloodsport",rarity:"red",base:100,weight:10},
{name:"Karambit | Ruby",rarity:"gold",base:500,weight:4},
{name:"Karambit | Emerald",rarity:"gold",base:500,weight:4},
{name:"Karambit | Sapphire",rarity:"gold",base:500,weight:4},
{name:"Karambit | Blue Gem",rarity:"gold",base:800,weight:3}
];

let market={};
skins.forEach(s=>market[s.name]=s.base);

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function update(){
document.getElementById("money").innerText=Math.floor(money);
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
document.getElementById("bank").innerText=Math.floor(bank);
document.getElementById("auto").innerText=autoClickers;
document.getElementById("prestige").innerText=prestige;
let tier=Math.min(Math.floor(level/5),ranks.length-1);
document.getElementById("rank").innerText=ranks[tier];
localStorage.setItem("eliteSave",JSON.stringify({money,xp,level,inventory,bank,prestige,autoClickers}));
}

function gainXP(a){
xp+=a;
if(xp>=level*100){xp=0;level++;}
}

function clickMoney(){
money+=1+(prestige*2);
gainXP(5);
update();
}

function buyAuto(){
if(money<500)return;
money-=500;
autoClickers++;
update();
}

setInterval(()=>{
money+=autoClickers*(1+prestige);
update();
},1000);

function weightedSkin(){
let total=skins.reduce((a,b)=>a+b.weight,0);
let r=Math.random()*total;
for(let s of skins){
if(r<s.weight)return s;
r-=s.weight;
}
}

function openCase(){
if(money<50)return;
money-=50;
let container=document.getElementById("caseAnimation");
container.innerHTML="";
let roll=[];
for(let i=0;i<35;i++){
let skin=weightedSkin();
roll.push(skin);
let div=document.createElement("div");
div.className="caseItem rarity-"+skin.rarity;
div.innerText=skin.name;
container.appendChild(div);
}
let scroll=0;
let anim=setInterval(()=>{scroll+=15;container.scrollLeft=scroll;},20);
setTimeout(()=>{
clearInterval(anim);
let win=roll[30];
let float=Math.random().toFixed(4);
let st=Math.random()<0.1;
inventory.push({...win,float,st});
updateInv();
gainXP(50);
update();
},2000);
}

function updateInv(){
let div=document.getElementById("inv");
div.innerHTML="";
inventory.forEach((item,i)=>{
let value=Math.floor(market[item.name]+(1-item.float)*50);
if(item.st)value*=1.5;
div.innerHTML+=`
<div class="card rarity-${item.rarity}">
${item.st?"★ StatTrak™ ":""}${item.name}<br>
Float: ${item.float}<br>
Value: $${Math.floor(value)}
<button onclick="sell(${i},${value})">Sell</button>
</div>`;
});
}

function sell(i,v){
money+=v;
inventory.splice(i,1);
updateInv();
update();
}

function spinRoulette(){
let bet=parseInt(document.getElementById("rouletteBet").value);
if(!bet||bet>money)return;
money-=bet;
let roll=Math.random();
if(roll<0.45){}
else if(roll<0.9)money+=bet*2;
else money+=bet*10;
update();
}

function draw(){return Math.floor(Math.random()*11)+1;}

function startBJ(){
bjBet=parseInt(document.getElementById("bjBet").value);
if(!bjBet||bjBet>money)return;
money-=bjBet;
bjPlayer=[draw(),draw()];
bjDealer=[draw(),draw()];
displayBJ();
}

function hit(){bjPlayer.push(draw());displayBJ();}

function stand(){
while(sum(bjDealer)<17)bjDealer.push(draw());
let p=sum(bjPlayer),d=sum(bjDealer);
if(p<=21&&(p>d||d>21))money+=bjBet*2;
document.getElementById("bjDisplay").innerText="You:"+p+" Dealer:"+d;
update();
}

function displayBJ(){
document.getElementById("bjDisplay").innerText="You:"+sum(bjPlayer)+" Dealer:"+bjDealer[0]+" ?";
}

function sum(a){return a.reduce((x,y)=>x+y,0);}

function caseBattle(){
if(money<100)return;
money-=100;
let p=weightedSkin(),b=weightedSkin();
let pVal=p.base+Math.random()*50;
let bVal=b.base+Math.random()*50;
if(pVal>bVal)money+=200;
document.getElementById("battleResult").innerHTML="You:"+p.name+"<br>Bot:"+b.name;
update();
}

function deposit(){
let amt=parseInt(prompt("Deposit amount"));
if(!amt||amt>money)return;
money-=amt;bank+=amt;update();
}

function withdraw(){money+=bank;bank=0;update();}

setInterval(()=>{bank*=1.01;},5000);

setInterval(()=>{
for(let s in market){
let change=(Math.random()*0.2-0.1);
market[s]+=market[s]*change;
if(market[s]<5)market[s]=5;
}
},4000);

function updateLeaderboard(){
let list=[
{name:"You",money:money},
{name:"KnifeLord",money:Math.random()*60000},
{name:"CSKing",money:Math.random()*80000}
];
list.sort((a,b)=>b.money-a.money);
let text="";
list.forEach(p=>text+=p.name+" - $"+Math.floor(p.money)+"<br>");
document.getElementById("leaderboard").innerHTML=text;
}
setInterval(updateLeaderboard,5000);

function doPrestige(){
if(level<20)return alert("Reach Level 20!");
prestige++;
money=0;xp=0;level=1;inventory=[];bank=0;
updateInv();update();
}

function load(){
let s=JSON.parse(localStorage.getItem("eliteSave"));
if(s){
money=s.money;xp=s.xp;level=s.level;
inventory=s.inventory;bank=s.bank;
prestige=s.prestige||0;
autoClickers=s.autoClickers||0;
}
updateInv();update();
}
load();
</script>

</body>
</html>
